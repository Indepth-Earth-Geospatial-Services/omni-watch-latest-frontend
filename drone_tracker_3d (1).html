<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drone Tracker — DJI Dock 3</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #cesiumContainer {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Hide Cesium default UI clutter */
        .cesium-viewer-toolbar,
        .cesium-viewer-animationContainer,
        .cesium-viewer-timelineContainer,
        .cesium-viewer-fullscreenContainer,
        .cesium-viewer-infoBoxContainer,
        .cesium-viewer-selectionIndicatorContainer,
        .cesium-viewer-bottom {
            display: none !important;
        }

        .cesium-widget-credits {
            opacity: 0.3 !important;
            font-size: 9px !important;
        }

        /* Overlay panels */
        .hud {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
        }

        /* Live Stream Panel */
        #videoPanel {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 480px;
            aspect-ratio: 16/9;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 204, 255, 0.3);
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }

        #videoPanel.visible {
            display: block;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #liveVideo {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: cover;
        }

        .video-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px 15px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            z-index: 10;
        }

        .live-tag {
            background: #ff3b3b;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            text-transform: uppercase;
        }

        .hud>* {
            pointer-events: auto;
        }

        .top-bar {
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10, 14, 26, 0.85) 0%, rgba(10, 14, 26, 0) 100%);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00ccff, #00ff99);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .logo h1 span {
            color: #00ccff;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 204, 255, 0.2);
            border-radius: 20px;
            padding: 6px 14px;
            color: #ccc;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }

        .status-dot.connected {
            background: #00ff99;
            box-shadow: 0 0 8px rgba(0, 255, 153, 0.6);
        }

        /* Telemetry panel */
        .telemetry {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }

        .tele-panel {
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 204, 255, 0.15);
            border-radius: 14px;
            padding: 16px;
            min-width: 300px;
            color: #e0e6f0;
            margin-bottom: 10px;
        }

        .tele-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tele-header .badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .badge.drone-badge {
            background: #00ccff;
            box-shadow: 0 0 8px rgba(0, 204, 255, 0.6);
        }

        .badge.dock-badge {
            background: #ff3333;
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
        }

        .tele-header h3 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tele-header h3.drone-label {
            color: #00ccff;
        }

        .tele-header h3.dock-label {
            color: #ff5555;
        }

        .tele-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .tele-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .tele-label {
            font-size: 9px;
            color: #5a6a88;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        .tele-val {
            font-size: 14px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #e0e6f0;
        }

        .tele-val.cyan {
            color: #00ccff;
        }

        .tele-val.green {
            color: #00ff99;
        }

        .tele-val.orange {
            color: #ffaa33;
        }

        .tele-val.red {
            color: #ff5555;
        }

        /* Controls panel */
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-btn {
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 204, 255, 0.2);
            border-radius: 10px;
            padding: 10px 16px;
            color: #ccc;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(0, 204, 255, 0.15);
            border-color: rgba(0, 204, 255, 0.4);
            color: #fff;
        }

        .ctrl-btn.active {
            background: rgba(0, 204, 255, 0.2);
            border-color: #00ccff;
            color: #00ccff;
        }

        /* Altitude gauge */
        .alt-gauge {
            position: absolute;
            right: 20px;
            top: 80px;
            bottom: 120px;
            width: 50px;
            z-index: 1000;
        }

        .alt-track {
            width: 4px;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            margin: 0 auto;
            position: relative;
        }

        .alt-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #00ccff, #00ff99);
            border-radius: 2px;
            transition: height 0.5s ease;
            box-shadow: 0 0 8px rgba(0, 204, 255, 0.4);
        }

        .alt-label {
            position: absolute;
            width: 50px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: #00ccff;
            top: -20px;
        }

        .alt-title {
            position: absolute;
            bottom: -20px;
            width: 50px;
            text-align: center;
            font-size: 9px;
            color: #5a6a88;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Gimbal buttons */
        .video-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .gimbal-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 18px;
            user-select: none;
        }

        .gimbal-btn:hover {
            background: rgba(0, 204, 255, 0.2);
            border-color: rgba(0, 204, 255, 0.4);
            color: #fff;
            transform: scale(1.1);
        }

        .gimbal-btn:active {
            background: rgba(0, 204, 255, 0.3);
            transform: scale(0.95);
        }

        .gimbal-btn.up { top: 40px; left: 50%; transform: translateX(-50%); }
        .gimbal-btn.down { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .gimbal-btn.left { left: 20px; top: 50%; transform: translateY(-50%); }
        .gimbal-btn.right { right: 20px; top: 50%; transform: translateY(-50%); }
        .gimbal-btn.recenter { bottom: 20px; left: 20px; font-size: 14px; }
        .gimbal-btn.hard-down { bottom: 20px; right: 20px; font-size: 14px; }

        /* Command Modal */
        #cmdModal {
            position: absolute;
            z-index: 2000;
            width: 280px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 238, 139, 0.3);
            border-radius: 12px;
            padding: 20px;
            color: white;
            display: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .cmd-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #00ee8b;
            display: flex;
            justify-content: space-between;
        }

        .cmd-group {
            margin-bottom: 12px;
        }

        .cmd-group label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cmd-group input {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 8px 10px;
            color: white;
            font-size: 14px;
        }

        .cmd-actions {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .cmd-btn {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        .btn-primary {
            background: #00ee8b;
            color: #064e3b;
        }

        .btn-primary:hover:not(:disabled) {
            background: #00ffa3;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary:disabled, .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #authStatus {
            font-size: 10px;
            margin-top: 8px;
            text-align: center;
            color: #ef4444;
        }

        #authStatus.granted {
            color: #00ee8b;
        }
    </style>
</head>

<body>
    <div id="cesiumContainer"></div>

    <!-- Top bar -->
    <div class="hud top-bar">
        <div class="logo">
            <div class="logo-icon">🛩</div>
            <h1><span>3D</span> Drone Tracker</h1>
        </div>
        <div class="status-badge">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <!-- Telemetry -->
    <div class="telemetry" id="telemetryPanel" style="display: none;">
        <div class="tele-panel">
            <div class="tele-header">
                <div class="badge drone-badge"></div>
                <h3 class="drone-label">Matrice 4TD</h3>
            </div>
            <div class="tele-grid">
                <div class="tele-item">
                    <div class="tele-label">Lat</div>
                    <div class="tele-val cyan" id="droneLat">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Lon</div>
                    <div class="tele-val cyan" id="droneLon">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Alt</div>
                    <div class="tele-val green" id="droneAlt">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">H.Speed</div>
                    <div class="tele-val" id="droneHSpeed">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">V.Speed</div>
                    <div class="tele-val" id="droneVSpeed">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Heading</div>
                    <div class="tele-val" id="droneHeading">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Mode</div>
                    <div class="tele-val orange" id="droneMode">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Battery</div>
                    <div class="tele-val green" id="droneBattery">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">GPS</div>
                    <div class="tele-val" id="droneGPS">—</div>
                </div>
            </div>
        </div>

        <div class="tele-panel" style="min-width: 200px;">
            <div class="tele-header">
                <div class="badge dock-badge"></div>
                <h3 class="dock-label">Dock 3</h3>
            </div>
            <div class="tele-grid" style="grid-template-columns: 1fr 1fr;">
                <div class="tele-item">
                    <div class="tele-label">Mode</div>
                    <div class="tele-val orange" id="dockMode">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Drone</div>
                    <div class="tele-val" id="dockDroneIn">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Cover</div>
                    <div class="tele-val" id="dockCover">—</div>
                </div>
                <div class="tele-item">
                    <div class="tele-label">Temp</div>
                    <div class="tele-val" id="dockTemp">—</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Altitude gauge -->
    <div class="alt-gauge">
        <div class="alt-track">
            <div class="alt-fill" id="altFill" style="height: 0%;">
                <div class="alt-label" id="altLabel">0m</div>
            </div>
            <div class="alt-title">ALT</div>
        </div>
    </div>

    <!-- Floating Video Panel -->
    <div id="videoPanel" class="hud">
        <div class="video-header">
            <div style="display: flex; gap: 8px; align-items: center;">
                <span class="live-tag">Live</span>
                <span>M4TD — INTEGRATED CAMERA</span>
            </div>
            <button onclick="toggleVideo()" style="background:none; border:none; color:white; cursor:pointer; font-size:16px;">×</button>
        </div>
        <video id="liveVideo" autoplay playsinline muted></video>
        
        <!-- Gimbal Overlays -->
        <div class="video-controls">
            <button class="gimbal-btn up" onmousedown="startGimbal('up')" onmouseup="stopGimbal()" onmouseleave="stopGimbal()" title="Tilt Up">▲</button>
            <button class="gimbal-btn down" onmousedown="startGimbal('down')" onmouseup="stopGimbal()" onmouseleave="stopGimbal()" title="Tilt Down">▼</button>
            <button class="gimbal-btn left" onmousedown="startGimbal('left')" onmouseup="stopGimbal()" onmouseleave="stopGimbal()" title="Rotate Left">◀</button>
            <button class="gimbal-btn right" onmousedown="startGimbal('right')" onmouseup="stopGimbal()" onmouseleave="stopGimbal()" title="Rotate Right">▶</button>
            <button class="gimbal-btn recenter" onclick="gimbalReset(0)" title="Recenter">↻</button>
            <button class="gimbal-btn hard-down" onclick="gimbalReset(1)" title="Down 90°">⬇</button>
        </div>
    </div>

    <!-- Right Click Command Modal -->
    <div id="cmdModal">
        <div class="cmd-header">
            <span>Flight Command</span>
            <span style="cursor:pointer" onclick="closeCmdModal()">×</span>
        </div>
        <div id="coordDisplay" style="font-size: 10px; color: #94a3b8; margin-bottom: 15px;"></div>
        
        <div class="cmd-group">
            <label>Target Height (m)</label>
            <input type="number" id="targetHeight" value="120">
        </div>
        <div class="cmd-group">
            <label>RTH Altitude (m)</label>
            <input type="number" id="rthAlt" value="100">
        </div>
        <div class="cmd-group">
            <label>Max Speed (m/s)</label>
            <input type="number" id="maxSpeed" value="10">
        </div>

        <div class="cmd-actions">
            <button id="btnTakeoff" class="cmd-btn btn-primary" onclick="doTakeoff()" disabled>🚀 Takeoff to Point</button>
            <button id="btnFlyTo" class="cmd-btn btn-secondary" onclick="doFlyTo()" disabled>✈️ Fly to Point</button>
            <button id="btnAuth" class="cmd-btn btn-secondary" onclick="grabFlightAuth()">🔑 Grab Flight Authority</button>
        </div>
        <div id="authStatus">Authority Required</div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn" id="btnTelemetry" onclick="toggleTelemetry()">📊 Telemetry</button>
        <button class="ctrl-btn" id="btnFollow" onclick="toggleFollow()">📍 Follow Drone</button>
        <button class="ctrl-btn" onclick="clearTrail()">🗑 Clear Trail</button>
        <hr style="border-color: rgba(0,204,255,0.15); margin: 4px 0;">
            <div class="top-actions">
                <button id="btnLive" class="ctrl-btn" onclick="toggleVideo()">📹 Live View</button>
                <button id="btnDrc" class="ctrl-btn" onclick="toggleDrc()">🎮 Flight Control</button>
                <button id="btnRth" class="ctrl-btn" onclick="doRth()" disabled title="Return to Home">🏠 RTH</button>
                <button id="btnRthCancel" class="ctrl-btn" onclick="doRthCancel()" disabled title="Cancel RTH">🛑 Cancel</button>
            </div>
        <button class="ctrl-btn" onclick="emergencyStop()">🛑 E-STOP</button>
    </div>

    <script>
        // ─── Config ─────────────────────────────────────────────
        const MQTT_HOST = '35.222.89.171';
        const MQTT_PORT = 8083;
        const API_BASE = `http://${MQTT_HOST}:6789`;
        const DRONE_SN = '1581F8HGX254300A07E0';
        const DOCK_SN = '8UUXN3H00A031T';
        const MAX_ALT = 300;
        const PAYLOAD_INDEX = '99-0-0';
        let authToken = null;
        let workspaceId = null;
        let flightAuthGranted = false;
        let selectedCoords = null;
        let drcClient = null;
        let drcTopicPub = null;
        let drcSeq = 0;
        let drcActive = false;
        let streamStarted = false;
        let whepPeer = null;
        const DRC_SPEED = 3; // m/s for WASD
        const DRC_YAW_SPEED = 30; // deg/s for Q/E
        const DRC_ALT_SPEED = 2; // m for up/down

        const DRONE_MODES = {
            0: 'IDLE', 1: 'TAKEOFF PREP', 2: 'TAKEOFF DONE', 3: 'MANUAL',
            4: 'AUTO TAKEOFF', 5: 'WAYLINE', 6: 'PANORAMIC', 7: 'TRACKING',
            9: 'RTH', 10: 'LANDING', 14: 'DISCONNECTED', 15: 'APAS',
            16: 'VSTICK', 17: 'LIVE CTRL', '-1': 'UNKNOWN'
        };
        const DOCK_MODES = {
            0: 'IDLE', 1: 'DEBUG', 2: 'REMOTE DBG', 3: 'UPGRADING',
            4: 'WORKING', 5: 'DORMANT', '-1': 'UNKNOWN'
        };

        // ─── Cesium Setup ───────────────────────────────────────
        // No Ion token needed — using ESRI satellite tiles
        Cesium.Ion.defaultAccessToken = undefined;

        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.ArcGisMapServerImageryProvider({
                url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
            }),
            terrainProvider: new Cesium.EllipsoidTerrainProvider(),
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            fullscreenButton: false,
            infoBox: false,
            selectionIndicator: false,
            shadows: false,
            shouldAnimate: true
        });

        // Dark atmosphere
        viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0a0e1a');
        viewer.scene.globe.enableLighting = false;
        viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#1a2040');
        viewer.scene.skyBox.show = false;
        viewer.scene.sun.show = false;
        viewer.scene.moon.show = false;
        viewer.scene.skyAtmosphere.show = false;

        // Initial view
        const DEFAULT_LAT = 4.838393;
        const DEFAULT_LON = 6.976400;
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(DEFAULT_LON, DEFAULT_LAT, 800),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-45),
                roll: 0
            },
            duration: 0
        });

        function setupRightClick() {
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
            handler.setInputAction(function (click) {
                const cartesian = viewer.camera.pickEllipsoid(click.position, viewer.scene.globe.ellipsoid);
                if (cartesian) {
                    const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                    const lon = Cesium.Math.toDegrees(cartographic.longitude);
                    const lat = Cesium.Math.toDegrees(cartographic.latitude);
                    selectedCoords = { lon, lat };

                    showCmdModal(click.position.x, click.position.y);
                }
            }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);

            // Left click to close modal
            handler.setInputAction(function () {
                closeCmdModal();
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        }

        function showCmdModal(x, y) {
            const modal = document.getElementById('cmdModal');
            modal.style.display = 'block';
            modal.style.left = x + 'px';
            modal.style.top = y + 'px';
            document.getElementById('coordDisplay').innerText = `LAT: ${selectedCoords.lat.toFixed(6)}, LON: ${selectedCoords.lon.toFixed(6)}`;
            updateCmdButtons();
        }

        function closeCmdModal() {
            document.getElementById('cmdModal').style.display = 'none';
        }

        function updateCmdButtons() {
            // Using a threshold of 60m as requested for takeoff availability.
            const isAirborne = latestDroneAlt > 60.0;
            
            document.getElementById('btnTakeoff').disabled = !flightAuthGranted || isAirborne;
            document.getElementById('btnFlyTo').disabled = !flightAuthGranted || !isAirborne;
            document.getElementById('btnRth').disabled = !flightAuthGranted || !isAirborne;
            document.getElementById('btnRthCancel').disabled = !flightAuthGranted || !isAirborne;
        }

        setupRightClick();

        // ─── Entities ───────────────────────────────────────────
        let droneEntity = null;
        let dockEntity = null;
        let trailPositions = [];
        let trailEntity = null;
        let followMode = false;
        let currentDronePos = null;
        let currentHeading = 0;
        let currentAlt = 0;

        // Create dock marker
        function createDock(lat, lon) {
            if (dockEntity) viewer.entities.remove(dockEntity);
            dockEntity = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lon, lat, 2),
                point: {
                    pixelSize: 18,
                    color: Cesium.Color.fromCssColorString('#ff3333'),
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 3,
                    heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                    disableDepthTestDistance: Number.POSITIVE_INFINITY
                },
                label: {
                    text: 'DOCK 3',
                    font: '12px Inter, sans-serif',
                    fillColor: Cesium.Color.WHITE,
                    outlineColor: Cesium.Color.BLACK,
                    outlineWidth: 2,
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -18),
                    disableDepthTestDistance: Number.POSITIVE_INFINITY
                }
            });
        }

        // Generate arrow icon on canvas
        function createArrowCanvas() {
            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Glow
            ctx.shadowColor = '#00ccff';
            ctx.shadowBlur = 10;

            // Arrow pointing UP (north)
            ctx.beginPath();
            ctx.moveTo(size / 2, 6);          // nose
            ctx.lineTo(size - 10, size - 10);  // right wing
            ctx.lineTo(size / 2, size - 18);   // tail notch
            ctx.lineTo(10, size - 10);         // left wing
            ctx.closePath();

            ctx.fillStyle = '#00ccff';
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();

            return canvas;
        }

        const arrowCanvas = createArrowCanvas();

        // Create / update drone
        function updateDrone(lat, lon, alt, heading) {
            const pos = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
            currentDronePos = pos;
            currentHeading = heading || 0;
            currentAlt = alt || 0;

            if (!droneEntity) {
                droneEntity = viewer.entities.add({
                    position: pos,
                    billboard: {
                        image: arrowCanvas,
                        width: 40,
                        height: 40,
                        rotation: new Cesium.CallbackProperty(() => {
                            return -Cesium.Math.toRadians(currentHeading);
                        }, false),
                        alignedAxis: Cesium.Cartesian3.UNIT_Z,
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    },
                    label: {
                        text: 'M4TD',
                        font: 'bold 11px Inter, sans-serif',
                        fillColor: Cesium.Color.fromCssColorString('#00ccff'),
                        outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2,
                        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        pixelOffset: new Cesium.Cartesian2(0, -24),
                        disableDepthTestDistance: Number.POSITIVE_INFINITY
                    },
                    // Vertical line from drone to ground
                    polyline: {
                        positions: new Cesium.CallbackProperty(() => {
                            if (!currentDronePos) return [];
                            const carto = Cesium.Cartographic.fromCartesian(currentDronePos);
                            const groundPos = Cesium.Cartesian3.fromRadians(carto.longitude, carto.latitude, 0);
                            return [currentDronePos, groundPos];
                        }, false),
                        width: 1,
                        material: new Cesium.PolylineDashMaterialProperty({
                            color: Cesium.Color.fromCssColorString('#00ccff').withAlpha(0.4),
                            dashLength: 8
                        })
                    }
                });
            } else {
                droneEntity.position = pos;
            }

            // Update trail
            trailPositions.push(pos);
            if (trailPositions.length > 2000) trailPositions.shift();

            if (!trailEntity && trailPositions.length > 1) {
                trailEntity = viewer.entities.add({
                    polyline: {
                        positions: new Cesium.CallbackProperty(() => trailPositions, false),
                        width: 3,
                        material: new Cesium.PolylineGlowMaterialProperty({
                            glowPower: 0.3,
                            color: Cesium.Color.fromCssColorString('#00ccff').withAlpha(0.7)
                        }),
                        clampToGround: true
                    }
                });
            }

            // Update altitude gauge
            const pct = Math.min(100, (alt / MAX_ALT) * 100);
            const altFill = document.getElementById('altFill');
            const altLabel = document.getElementById('altLabel');
            altFill.style.height = pct + '%';
            altLabel.textContent = alt.toFixed(0) + 'm';
        }

        function clearTrail() {
            trailPositions = [];
            if (trailEntity) {
                viewer.entities.remove(trailEntity);
                trailEntity = null;
            }
        }

        // ─── Camera modes ───────────────────────────────────────
        function toggleTelemetry() {
            const panel = document.getElementById('telemetryPanel');
            const btn = document.getElementById('btnTelemetry');
            const visible = panel.style.display !== 'none';
            panel.style.display = visible ? 'none' : 'block';
            btn.classList.toggle('active', !visible);
        }

        function toggleFollow() {
            followMode = !followMode;
            document.getElementById('btnFollow').classList.toggle('active', followMode);
        }

        // Camera follow loop
        viewer.clock.onTick.addEventListener(() => {
            if (!currentDronePos) return;
            const carto = Cesium.Cartographic.fromCartesian(currentDronePos);
            const lon = Cesium.Math.toDegrees(carto.longitude);
            const lat = Cesium.Math.toDegrees(carto.latitude);
            const alt = carto.height;

            if (followMode) {
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(lon, lat, alt + 200),
                    orientation: {
                        heading: Cesium.Math.toRadians(0),
                        pitch: Cesium.Math.toRadians(-60),
                        roll: 0
                    },
                    duration: 0.5
                });
            }
        });

        // ─── UI Helpers ─────────────────────────────────────────
        function setText(id, val) {
            const el = document.getElementById(id);
            if (el) el.textContent = val;
        }

        // ─── Live Stream ────────────────────────────────────────
        let isStartingStream = false;
        async function startLiveStream() {
            if (streamStarted || isStartingStream) return;
            isStartingStream = true;

            if (!authToken) await apiLogin();

            console.log("Starting Live Stream...");
            try {
                const res = await apiPost('/manage/api/v1/live/streams/start', {
                    url: "",
                    video_id: `${DRONE_SN}/${PAYLOAD_INDEX}/normal-0`,
                    url_type: 4,
                    video_quality: 0
                });

                // 513003 means already started, which is fine
                if ((res.code === 0 || res.code === 513003) && res.data && res.data.url) {
                    streamStarted = true;
                    const whepUrl = res.data.url;
                    setupWhepPlayer(whepUrl);
                    document.getElementById('btnLive').style.borderColor = '#00ff99';
                } else {
                    console.warn("Stream start response:", res);
                    isStartingStream = false;
                }
            } catch (e) {
                console.error("Live stream start error:", e);
                isStartingStream = false;
            }
        }

        async function setupWhepPlayer(url) {
            const video = document.getElementById('liveVideo');
            const pc = new RTCPeerConnection();
            whepPeer = pc;

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.ontrack = (e) => { 
                if (e.streams && e.streams[0]) {
                    video.srcObject = e.streams[0];
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    body: offer.sdp,
                    headers: { 'Content-Type': 'application/sdp' }
                });
                const answer = await res.text();
                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'answer', sdp: answer }));
            } catch (e) {
                console.error("WHEP Handshake error:", e);
            }
        }

        function toggleVideo() {
            const panel = document.getElementById('videoPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                setupVideoInteractions();
            }
        }

        let gimbalInterval = null;
        let targetGimbalAltOffset = 0;

        function startGimbal(dir) {
            if (dir === 'left' || dir === 'right') {
                if (!drcActive) return;
                handlePublish({ w: (dir === 'left' ? -1 : 1) * DRC_YAW_SPEED / 2.5 });
            } else {
                if (gimbalInterval) clearInterval(gimbalInterval);
                const step = () => {
                    if (dir === 'up') targetGimbalAltOffset += 1.2;
                    else if (dir === 'down') targetGimbalAltOffset -= 1.2;
                    updateGimbalVertical();
                };
                step();
                gimbalInterval = setInterval(step, 150);
            }
        }

        function stopGimbal() {
            if (gimbalInterval) {
                clearInterval(gimbalInterval);
                gimbalInterval = null;
            }
            handleClearInterval(); // Stop yaw if active
        }

        async function updateGimbalVertical() {
            if (latestDroneLat === 0) return;
            
            const targetAlt = Math.max(2.0, latestDroneAlt + targetGimbalAltOffset);
            const targetLat = latestDroneLat + 0.0001;

            apiPost(`/control/api/v1/devices/${DOCK_SN}/payload/commands`, {
                cmd: 'camera_look_at',
                data: {
                    payload_index: PAYLOAD_INDEX,
                    latitude: targetLat,
                    longitude: latestDroneLon,
                    height: targetAlt,
                    locked: false
                }
            });
        }

        function setupVideoInteractions() {
            const video = document.getElementById('liveVideo');
            if (video.dataset.init === 'true') return;
            video.dataset.init = 'true';
            
            // Disable default right-click menu
            video.oncontextmenu = (e) => e.preventDefault();
            
            console.log("Video interactions ready (Buttons enabled)");
        }

        // ─── OSD Handlers ───────────────────────────────────────
        let latestDroneLat = 0, latestDroneLon = 0, latestDroneAlt = 0;

        function handleDroneOSD(data) {
            if (!streamStarted && data.latitude !== undefined) {
                startLiveStream();
            }
            if (data.latitude !== undefined) latestDroneLat = data.latitude;
            if (data.longitude !== undefined) latestDroneLon = data.longitude;
            if (data.height !== undefined) latestDroneAlt = data.height;

            const lat = data.latitude;
            const lon = data.longitude;
            const alt = data.height || 0;
            const heading = data.attitude_head || 0;
            const hSpeed = data.horizontal_speed;
            const vSpeed = data.vertical_speed;
            const mode = data.mode_code;
            const bat = data.battery?.capacity_percent;

            if (lat !== undefined && lon !== undefined) {
                setText('droneLat', lat.toFixed(5));
                setText('droneLon', lon.toFixed(5));
                updateDrone(lat, lon, alt, heading);
            }

            if (alt !== undefined) setText('droneAlt', alt.toFixed(1) + 'm');
            if (heading !== undefined) setText('droneHeading', heading.toFixed(0) + '°');
            if (hSpeed !== undefined) setText('droneHSpeed', hSpeed.toFixed(1));
            if (vSpeed !== undefined) setText('droneVSpeed', vSpeed.toFixed(1));
            if (mode !== undefined) setText('droneMode', DRONE_MODES[mode] || mode);
            if (bat !== undefined) setText('droneBattery', bat + '%');

            const ps = data.position_state;
            if (ps) setText('droneGPS', `${ps.gps_number || 0}/${ps.rtk_number || 0}`);
        }

        function handleDockOSD(data) {
            const lat = data.latitude;
            const lon = data.longitude;
            const mode = data.mode_code;

            if (lat !== undefined && lon !== undefined) {
                createDock(lat, lon);
            }

            if (mode !== undefined) setText('dockMode', DOCK_MODES[mode] || mode);
            if (data.drone_in_dock !== undefined) setText('dockDroneIn', data.drone_in_dock ? 'YES' : 'NO');
            if (data.cover_state !== undefined) setText('dockCover', data.cover_state ? 'OPEN' : 'CLOSED');
            if (data.temperature !== undefined) setText('dockTemp', data.temperature.toFixed(1) + '°');
        }

        // ─── MQTT ───────────────────────────────────────────────
        let droneOSDCount = 0;
        let dockOSDCount = 0;

        const client = mqtt.connect(`ws://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
            clientId: 'drone3d_' + Math.random().toString(16).substr(2, 8),
            clean: true,
            reconnectPeriod: 2000,
            keepalive: 30
        });

        client.on('connect', () => {
            document.getElementById('statusDot').classList.add('connected');
            setText('statusText', 'Connected');
            client.subscribe('thing/product/+/osd', { qos: 0 });
        });

        client.on('reconnect', () => setText('statusText', 'Reconnecting...'));
        client.on('close', () => {
            document.getElementById('statusDot').classList.remove('connected');
            setText('statusText', 'Disconnected');
        });

        client.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                const data = payload.data;
                if (!data) return;
                const sn = topic.split('/')[2];

                if (sn === DRONE_SN) {
                    handleDroneOSD(data);
                    droneOSDCount++;
                } else if (sn === DOCK_SN) {
                    handleDockOSD(data);
                    dockOSDCount++;
                }

                if (client.connected) {
                    setText('statusText', `Connected · D:${droneOSDCount} · K:${dockOSDCount}`);
                }
            } catch (e) { }
        });

        // ─── Backend API helpers ─────────────────────────────────
        async function apiLogin() {
            try {
                const res = await fetch(`${API_BASE}/manage/api/v1/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'adminPC', password: 'adminPC', flag: 1 })
                });
                const json = await res.json();
                if (json.code === 0) {
                    authToken = json.data.access_token;
                    workspaceId = json.data.workspace_id;
                    setText('statusText', 'Logged in ✓');
                    return true;
                }
                console.error('Login failed:', json);
            } catch (e) { console.error('Login error:', e); }
            return false;
        }

        function apiHeaders() {
            return { 'Content-Type': 'application/json', 'x-auth-token': authToken };
        }

        async function apiPost(path, body = {}) {
            const res = await fetch(`${API_BASE}${path}`, {
                method: 'POST', headers: apiHeaders(), body: JSON.stringify(body)
            });
            return res.json();
        }

        // ─── DRC (Drone Remote Control) ─────────────────────────
        async function toggleDrc() {
            if (!authToken) { const ok = await apiLogin(); if (!ok) return; }
            const btn = document.getElementById('btnDrc');

            if (drcActive) {
                // Exit DRC
                if (drcClient) { drcClient.end(); drcClient = null; }
                await apiPost(`/control/api/v1/workspaces/${workspaceId}/drc/exit`,
                    { client_id: 'cesium_drc', dock_sn: DOCK_SN });
                drcActive = false;
                btn.classList.remove('active');
                btn.textContent = '🎮 Flight Control';
                return;
            }

            // Grab flight authority first
            await apiPost(`/control/api/v1/devices/${DOCK_SN}/authority/flight`);

            // Get DRC MQTT credentials
            const connRes = await apiPost(`/control/api/v1/workspaces/${workspaceId}/drc/connect`,
                { client_id: 'cesium_drc', expire_sec: 3600 });
            if (connRes.code !== 0) { console.error('DRC connect failed:', connRes); return; }
            const broker = connRes.data;

            // Enter DRC mode
            const enterRes = await apiPost(`/control/api/v1/workspaces/${workspaceId}/drc/enter`,
                { client_id: 'cesium_drc', dock_sn: DOCK_SN });
            if (enterRes.code !== 0) { console.error('DRC enter failed:', enterRes); return; }

            drcTopicPub = enterRes.data.pub?.[0];

            // Connect DRC MQTT
            const addr = broker.address?.replace('tcp://', 'ws://').replace(':1883', ':8083') || `ws://${MQTT_HOST}:${MQTT_PORT}/mqtt`;
            drcClient = mqtt.connect(addr.includes('://') ? addr : `ws://${addr}/mqtt`, {
                clientId: broker.client_id || 'cesium_drc',
                username: broker.username,
                password: broker.password,
                clean: true
            });

            drcClient.on('connect', () => {
                drcActive = true;
                drcSeq = 0;
                btn.classList.add('active');
                btn.textContent = '🎮 ACTIVE (WASD)';
                // Subscribe to DRC responses
                if (enterRes.data.sub) {
                    enterRes.data.sub.forEach(t => drcClient.subscribe(t));
                }
                // Heartbeat
                setInterval(() => {
                    if (drcActive && drcTopicPub) {
                        drcClient.publish(drcTopicPub, JSON.stringify({
                            method: 'heart_beat', data: { seq: drcSeq++, timestamp: Date.now() }
                        }));
                    }
                }, 1000);
            });
        }

        function sendDrcCommand(x, y, h, w) {
            if (!drcActive || !drcClient || !drcTopicPub) return;
            drcClient.publish(drcTopicPub, JSON.stringify({
                method: 'drone_control',
                data: { x: x || 0, y: y || 0, h: h || 0, w: w || 0, seq: drcSeq++ }
            }));
        }

        async function emergencyStop() {
            if (!drcActive || !drcClient || !drcTopicPub) return;
            drcClient.publish(drcTopicPub, JSON.stringify({
                method: 'drone_emergency_stop', data: { seq: drcSeq++ }
            }));
        }

        async function grabFlightAuth() {
            if (!authToken) { const ok = await apiLogin(); if (!ok) return; }
            const res = await apiPost(`/control/api/v1/devices/${DOCK_SN}/authority/flight`);
            if (res && res.code === 0) {
                flightAuthGranted = true;
                document.getElementById('authStatus').innerText = "Authority Granted";
                document.getElementById('authStatus').className = "granted";
                document.getElementById('btnAuth').style.display = "none";
                updateCmdButtons();
                console.log("Flight Authority Acquired");
            } else {
                console.error("Failed to acquire flight authority");
            }
        }

        async function doTakeoff() {
            if (!selectedCoords) return;
            const targetH = parseFloat(document.getElementById('targetHeight').value);
            const rthH = parseFloat(document.getElementById('rthAlt').value);
            const speed = parseInt(document.getElementById('maxSpeed').value);

            const body = {
                target_height: targetH,
                target_latitude: selectedCoords.lat,
                target_longitude: selectedCoords.lon,
                security_takeoff_height: 20,
                max_speed: speed,
                rc_lost_action: 2, // RETURN_HOME
                rth_altitude: rthH,
                exit_wayline_when_rc_lost: 1,
                rth_mode: 0,
                commander_mode_lost_action: 1,
                commander_flight_mode: 0,
                commander_flight_height: targetH
            };

            const res = await apiPost(`/control/api/v1/devices/${DOCK_SN}/jobs/takeoff-to-point`, body);
            if (res && res.code === 0) {
                console.log("Takeoff Command Sent Successfully!");
                closeCmdModal();
            } else {
                console.error("Takeoff Failed: " + (res.message || "Unknown error"));
            }
        }

        async function doFlyTo() {
            if (!selectedCoords) return;
            const targetH = parseFloat(document.getElementById('targetHeight').value);
            const speed = parseInt(document.getElementById('maxSpeed').value);

            const body = {
                max_speed: speed,
                points: [{
                    latitude: selectedCoords.lat,
                    longitude: selectedCoords.lon,
                    height: targetH
                }]
            };

            const res = await apiPost(`/control/api/v1/devices/${DOCK_SN}/jobs/fly-to-point`, body);
            if (res && res.code === 0) {
                console.log("Fly-to-Point Command Sent Successfully!");
                closeCmdModal();
            } else {
                console.error("Fly-to-Point Failed: " + (res.message || "Unknown error"));
            }
        }

        async function doRth() {
            if (!authToken) { const ok = await apiLogin(); if (!ok) return; }
            const res = await apiPost(`/control/api/v1/devices/${DOCK_SN}/jobs/return_home`, { action: 0 });
            if (res && res.code === 0) {
                console.log("RTH Command Sent!");
            } else {
                console.error("RTH Failed: " + (res.message || "Unknown error"));
            }
        }

        async function doRthCancel() {
            if (!authToken) { const ok = await apiLogin(); if (!ok) return; }
            const res = await apiPost(`/control/api/v1/devices/${DOCK_SN}/jobs/return_home_cancel`, { action: 0 });
            if (res && res.code === 0) {
                console.log("RTH Cancelled!");
            } else {
                console.error("Failed to cancel RTH: " + (res.message || "Unknown error"));
            }
        }

        // ─── Gimbal / Payload ────────────────────────────────────
        async function gimbalReset(mode) {
            targetGimbalAltOffset = 0;
            if (!authToken) { const ok = await apiLogin(); if (!ok) return; }
            // Grab payload authority
            await apiPost(`/control/api/v1/devices/${DOCK_SN}/authority/payload`,
                { payload_index: PAYLOAD_INDEX });
            // Send gimbal reset
            await apiPost(`/control/api/v1/devices/${DOCK_SN}/payload/commands`, {
                cmd: 'gimbal_reset',
                data: { payload_index: PAYLOAD_INDEX, reset_mode: mode }
            });
        }

        // ─── Keyboard Controls (Exact TSA Replica) ─────────────────────────
        let activeCodeKey = null;
        let myInterval = null;
        let seq = 0;

        function handlePublish(params) {
            handleClearInterval();
            myInterval = setInterval(() => {
                if (!drcActive || !drcClient || !drcTopicPub) return;
                let body = {
                    method: 'drone_control',
                    data: { ...params, seq: seq++ }
                };
                seq++; // Mimic TSA double increment
                drcClient.publish(drcTopicPub, JSON.stringify(body), { qos: 0 });
            }, 50);
        }

        function handleClearInterval() {
            if (myInterval) {
                clearInterval(myInterval);
                myInterval = null;
            }
        }

        function resetControlState() {
            activeCodeKey = null;
            seq = 0;
            handleClearInterval();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') { toggleFollow(); return; }
            
            if (!drcActive) return;

            let code = e.code;
            if (activeCodeKey === code) return;

            seq = 0;
            switch (code) {
                case 'KeyA':
                    handlePublish({ y: -DRC_SPEED });
                    activeCodeKey = code;
                    break;
                case 'KeyD':
                    handlePublish({ y: DRC_SPEED });
                    activeCodeKey = code;
                    break;
                case 'KeyW':
                    handlePublish({ x: DRC_SPEED });
                    activeCodeKey = code;
                    break;
                case 'KeyS':
                    handlePublish({ x: -DRC_SPEED });
                    activeCodeKey = code;
                    break;
                case 'KeyQ':
                    handlePublish({ w: -DRC_YAW_SPEED });
                    activeCodeKey = code;
                    break;
                case 'KeyE':
                    handlePublish({ w: DRC_YAW_SPEED });
                    activeCodeKey = code;
                    break;
                case 'ArrowUp':
                    handlePublish({ h: DRC_ALT_SPEED });
                    activeCodeKey = code;
                    break;
                case 'ArrowDown':
                    handlePublish({ h: -DRC_ALT_SPEED });
                    activeCodeKey = code;
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            resetControlState();
        });

        // Auto-login on load
        apiLogin();
    </script>
</body>
